# PR마다 Claude(anthropics/claude-code-action)가 자동으로 코드 리뷰 댓글을 남김.
# 이 세션에서 쓰는 리뷰어 체크리스트(보안→코드품질→React패턴→성능→베스트프랙티스)를
# CI 전용으로 이식. 필요 사전 작업(직접 해주셔야 함):
#   1) GitHub 저장소 Settings → Secrets and variables → Actions →
#      New repository secret → 이름 ANTHROPIC_API_KEY, 값 = Anthropic API 키
#   2) 첫 실행 후 PR에 리뷰 댓글이 안 달리면 anthropics/claude-code-action README의
#      입력 필드명(prompt/direct_prompt 등)이 버전업으로 바뀌었을 수 있음 — 확인 필요.
#      (이 워크플로 작성 시점에 실시간 문서 재확인이 막혀 있어 기억 기반으로 작성함)

name: Claude 코드 리뷰

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude 리뷰 실행
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            너는 flowmind(Vite+React+TypeScript) 프로젝트의 시니어 코드 리뷰어다.
            아키텍처: ui(src/) → core(engine·state, 순수 로직, IO 의존 0) ← data(local, Dexie).
            core/는 React·Dexie·전역시간(Date.now 직접호출) 의존을 절대 두면 안 됨 — now는
            인자로 주입. data/는 core 타입만 참조, UI 의존 0.

            이 PR의 diff만 리뷰하고 아래 우선순위로 점검:
            1. CRITICAL — 보안(비밀키 하드코딩, XSS, 인증 누락 등)
            2. HIGH — core/ 의존 규칙 위반, React hooks 규칙(불필요한 effect, 순수성),
               타입 안전성, 에러 처리 누락
            3. MEDIUM — 성능, 불필요한 리렌더
            4. LOW — 네이밍, 매직 넘버

            확신 80% 미만이거나 근거(파일·줄 번호)를 못 댈 발견은 보고하지 마라.
            한글로 작성하고, 발견마다 [심각도]/파일:줄/근거/수정 제안 형식, 마지막에
            심각도별 요약 표와 APPROVE/WARNING/BLOCK 결론을 단다. 발견이 없으면
            "이상 없음, APPROVE"라고만 답해도 된다(억지로 지적거리를 만들지 마라).
          allowed_tools: "Read,Grep,Glob,Bash(npm run build),Bash(npm run lint),Bash(npx vitest run)"
